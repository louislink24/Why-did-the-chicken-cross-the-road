<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chicken Crossroad</title>

<style>
body{
    margin:0;
    background:#222;
    color:white;
    font-family:Arial,sans-serif;
    text-align:center;
}

h1{
    margin:10px;
}

#score{
    font-size:24px;
    margin-bottom:10px;
}

canvas{
    background:#444;
    border:3px solid white;
}
</style>
</head>
<body>

<h1>🐔 Chicken Crossroad</h1>
<div id="score">Score : 0</div>

<canvas id="game" width="500" height="600"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const scoreText = document.getElementById("score");

let score = 0;

const chicken = {
    x: 240,
    y: 550,
    size: 20
};

const cars = [];

function createCar(y,speed,color){
    cars.push({
        x: speed > 0 ? -100 : canvas.width + 100,
        y,
        width: 80,
        height: 35,
        speed,
        color
    });
}

for(let i=0;i<8;i++){
    createCar(80 + i*60,
    Math.random()>0.5 ? 3+Math.random()*3 : -(3+Math.random()*3),
    `hsl(${Math.random()*360},80%,60%)`);
}

document.addEventListener("keydown",(e)=>{

    const step = 30;

    if(e.key==="z" || e.key==="ArrowUp"){
        chicken.y -= step;
    }

    if(e.key==="s" || e.key==="ArrowDown"){
        chicken.y += step;
    }

    if(e.key==="q" || e.key==="ArrowLeft"){
        chicken.x -= step;
    }

    if(e.key==="d" || e.key==="ArrowRight"){
        chicken.x += step;
    }

    chicken.x = Math.max(0,Math.min(canvas.width-chicken.size,chicken.x));
    chicken.y = Math.max(0,Math.min(canvas.height-chicken.size,chicken.y));

    if(chicken.y <= 0){
        score++;
        scoreText.textContent = "Score : " + score;

        chicken.x = 240;
        chicken.y = 550;

        cars.forEach(car=>{
            if(car.speed>0){
                car.speed += 0.3;
            }else{
                car.speed -= 0.3;
            }
        });
    }
});

function collision(a,b){
    return (
        a.x < b.x + b.width &&
        a.x + a.size > b.x &&
        a.y < b.y + b.height &&
        a.y + a.size > b.y
    );
}

function gameOver(){
    alert("💥 Game Over ! Score : " + score);

    score = 0;
    scoreText.textContent = "Score : 0";

    chicken.x = 240;
    chicken.y = 550;
}

function update(){

    cars.forEach(car=>{

        car.x += car.speed;

        if(car.speed > 0 && car.x > canvas.width + 100){
            car.x = -100;
        }

        if(car.speed < 0 && car.x < -100){
            car.x = canvas.width + 100;
        }

        if(collision(chicken,car)){
            gameOver();
        }
    });
}

function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    for(let y=60;y<canvas.height;y+=60){
        ctx.fillStyle="#666";
        ctx.fillRect(0,y,canvas.width,40);
    }

    cars.forEach(car=>{
        ctx.fillStyle = car.color;
        ctx.fillRect(car.x,car.y,car.width,car.height);
    });

    ctx.font="25px Arial";
    ctx.fillText("🐔",chicken.x,chicken.y+20);
}

function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}

function move(direction){

    const step = 30;

    if(direction === "up"){
        chicken.y -= step;
    }

    if(direction === "down"){
        chicken.y += step;
    }

    if(direction === "left"){
        chicken.x -= step;
    }

    if(direction === "right"){
        chicken.x += step;
    }

    chicken.x = Math.max(0,Math.min(canvas.width-chicken.size,chicken.x));
    chicken.y = Math.max(0,Math.min(canvas.height-chicken.size,chicken.y));

    if(chicken.y <= 0){
        score++;
        scoreText.textContent = "Score : " + score;

        chicken.x = 240;
        chicken.y = 550;

        cars.forEach(car=>{
            if(car.speed > 0){
                car.speed += 0.3;
            }else{
                car.speed -= 0.3;
            }
        });
    }
        }
    loop();
</script>

    <div id="mobileControls">
    <button onclick="move('up')">⬆️</button><br>
    <button onclick="move('left')">⬅️</button>
    <button onclick="move('down')">⬇️</button>
    <button onclick="move('right')">➡️</button>
</div>

<style>
#mobileControls{
    margin-top:15px;
}

#mobileControls button{
    width:70px;
    height:70px;
    font-size:30px;
    margin:4px;
    border:none;
    border-radius:15px;
    cursor:pointer;
}
</style>
</body>
  </html>
