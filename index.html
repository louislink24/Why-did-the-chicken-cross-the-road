<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chicken Crossroad</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(#111,#000);
    color:white;
    text-align:center;
    user-select:none;
}

h1{
    margin:10px;
}

button{
    padding:10px 15px;
    margin:5px;
    border:none;
    border-radius:12px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    transform:scale(1.05);
}

canvas{
    background:linear-gradient(#444,#222);
    display:block;
    margin:auto;
    border:3px solid white;
    border-radius:10px;
}

#mobileControls button{
    width:70px;
    height:70px;
    font-size:28px;
    border-radius:15px;
}

#back{
    position:absolute;
    top:10px;
    left:10px;
    font-size:28px;
    cursor:pointer;
    display:none;
}
</style>
</head>

<body>

<div id="back" onclick="goMenu()">⬅️</div>

<h1>🐔 Chicken Crossroad</h1>

<div id="menu">
    <button onclick="startGame()">Play</button>
    <button onclick="openSkins()">Skins</button>
    <p>🏆 Best: <span id="best">0</span></p>
</div>

<div id="skinsMenu" style="display:none;">
    <p>Choisis ton skin</p>
    <div id="skinList"></div>
</div>

<canvas id="game" width="500" height="600" style="display:none;"></canvas>

<div id="mobileControls" style="display:none;">
    <button onclick="move('up')">⬆️</button><br>
    <button onclick="move('left')">⬅️</button>
    <button onclick="move('down')">⬇️</button>
    <button onclick="move('right')">➡️</button>
</div>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const menu = document.getElementById("menu");
const skinsMenu = document.getElementById("skinsMenu");
const mobileControls = document.getElementById("mobileControls");
const backBtn = document.getElementById("back");

let state = "menu";

let skin = "🐔";
let score = 0;

let best = localStorage.getItem("best") || 0;
document.getElementById("best").textContent = best;

let ufoUnlocked = false;

const skinListArray = ["🐵","🐭","🐰","🐼","🐱","🐶","🐨","🐻","🐧","🐦","🦆","🐔"];
const secretSkin = "☭";

const chicken = {x:240,y:550,size:20};

const cars = [];
const coins = [];

function setup(){
    cars.length = 0;
    coins.length = 0;

    for(let i=0;i<6;i++){
        cars.push({
            x:Math.random()*500,
            y:80+i*80,
            w:80,
            h:30,
            speed:(Math.random()>0.5?1:-1)*(2+Math.random()*2)
        });
    }

    for(let i=0;i<6;i++){
        coins.push({
            x:Math.random()*500,
            y:Math.random()*600,
            r:10,
            taken:false
        });
    }
}

function startGame(){
    state = "game";
    menu.style.display = "none";
    skinsMenu.style.display = "none";
    canvas.style.display = "block";
    mobileControls.style.display = "block";
    backBtn.style.display = "block";
    setup();
}

function openSkins(){
    state = "skins";
    menu.style.display = "none";
    skinsMenu.style.display = "block";

    const box = document.getElementById("skinList");
    box.innerHTML = "";

    let back = document.createElement("div");
    back.textContent = "⬅️ Retour";
    back.style.cursor = "pointer";
    back.style.fontSize = "20px";
    back.style.marginBottom = "10px";
    back.onclick = goMenu;
    box.appendChild(back);

    skinListArray.forEach(s=>{
        let b = document.createElement("button");
        b.textContent = s;
        b.onclick = () => skin = s;
        box.appendChild(b);
    });

    let secretBtn = document.createElement("button");
    secretBtn.textContent = ufoUnlocked ? secretSkin : "🔒";
    secretBtn.onclick = () => {
        if(ufoUnlocked) skin = secretSkin;
    };
    box.appendChild(secretBtn);
}

function goMenu(){
    state = "menu";
    menu.style.display = "block";
    skinsMenu.style.display = "none";
    canvas.style.display = "none";
    mobileControls.style.display = "none";
    backBtn.style.display = "none";
}

function move(dir){
    let step = 30;

    if(dir==="up") chicken.y -= step;
    if(dir==="down") chicken.y += step;
    if(dir==="left") chicken.x -= step;
    if(dir==="right") chicken.x += step;

    chicken.x = Math.max(0,Math.min(500,chicken.x));
    chicken.y = Math.max(0,Math.min(600,chicken.y));

    if(chicken.y <= 0){
        score++;
        chicken.x = 240;
        chicken.y = 550;

        if(score >= 5) ufoUnlocked = true;

        if(score > best){
            best = score;
            localStorage.setItem("best",best);
            document.getElementById("best").textContent = best;
        }
    }
}

document.addEventListener("keydown",e=>{
    if(e.key==="z")move("up");
    if(e.key==="s")move("down");
    if(e.key==="q")move("left");
    if(e.key==="d")move("right");
});

function update(){

    cars.forEach(c=>{
        c.x += c.speed;

        if(c.x > 500) c.x = -100;
        if(c.x < -100) c.x = 500;

        if(hit(c) && skin !== secretSkin){
            reset();
        }
    });

    coins.forEach(c=>{
        if(!c.taken &&
        Math.abs(chicken.x - c.x) < 20 &&
        Math.abs(chicken.y - c.y) < 20){

            score++;
            c.taken = true;

            if(score > best){
                best = score;
                localStorage.setItem("best",best);
                document.getElementById("best").textContent = best;
            }

            if(score >= 5) ufoUnlocked = true;
        }
    });
}

function hit(c){
    return chicken.x < c.x + c.w &&
           chicken.x + 20 > c.x &&
           chicken.y < c.y + c.h &&
           chicken.y + 20 > c.y;
}

function reset(){
    alert("💥 Game Over");
    score = 0;
    chicken.x = 240;
    chicken.y = 550;
}

function draw(){
    ctx.clearRect(0,0,500,600);

    cars.forEach(c=>{
        ctx.fillStyle = "#ff3b3b";
        ctx.fillRect(c.x,c.y,c.w,c.h);
    });

    coins.forEach(c=>{
        if(!c.taken){
            ctx.fillStyle = "gold";
            ctx.beginPath();
            ctx.arc(c.x,c.y,c.r,0,Math.PI*2);
            ctx.fill();
        }
    });

    ctx.font = "30px Arial";
    ctx.fillText(skin,chicken.x,chicken.y);
}

function loop(){
    if(state === "game"){
        update();
        draw();
    }
    requestAnimationFrame(loop);
}

loop();

</script>

</body>
        </html>
